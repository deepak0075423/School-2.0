name: School2.0

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd School-2.0
            git pull origin main
            npm install --production
            mkdir -p logs

            # ── nginx: ensure SSE proxying works ──────────────────────
            # Add buffering-off + long read timeout if not already set
            NGINX_CONF="/etc/nginx/sites-available/default"
            if [ -f "$NGINX_CONF" ] && ! grep -q "proxy_buffering off" "$NGINX_CONF"; then
              sudo sed -i '/proxy_pass http:\/\/localhost:3000;/a\        proxy_buffering off;\n        proxy_read_timeout 86400;\n        proxy_http_version 1.1;\n        proxy_set_header Connection "";' "$NGINX_CONF"
              echo "✅ nginx SSE config applied"
            fi
            sudo nginx -t && sudo systemctl reload nginx

            # ── PM2: start or restart using ecosystem (fork, 1 instance) ─
            pm2 describe school-app > /dev/null 2>&1 \
              && pm2 restart ecosystem.config.js --update-env \
              || pm2 start   ecosystem.config.js
            pm2 save
